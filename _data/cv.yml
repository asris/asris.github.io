    Experience:
      - company: Center for Neuroscience Research, Children's National Research Institute
        position: PhRMA Research Postdoctoral Scientist
        location: Washington, DC, USA
        start_date: 2021-02
        end_date: Present
        summary: >
          Designed and executed translational assays in human- and rodent-derived systems to
          quantify neurological disease-linked biomarkers, with an active research program
          extending into pediatric epilepsy circuit biology and implantable brain-delivery
          devices.
        highlights:
          - Developed ELISA and multiplex immunoassays for protein quantification in neuronal lysates and biofluids.
          - Performed 3D neural culture assays, brain-slice biomarker analyses, and multi-parametric fluorescence imaging.
          - Analyzed mitochondrial dysfunction, inflammatory pathway activation, and proteostasis failure via RT-qPCR, Western blot / JESS capillary electrophoresis, and caspase assays.
          - Integrated MATLAB and Python workflows to model biomarker trajectories and quantify therapeutic responses.
          - Optimized assay sensitivity and reproducibility across multi-site collaborations.
          - Mentored trainees in assay design, execution, QC, and data interpretation.
          - Maintained rigorous electronic laboratory notebook (ELN) documentation and data-integrity compliance.
          - "Currently developing HD-MEA electrophysiology pipelines (MaxOne PLM/PSM) for acute brain slice and cerebellar-organoid functional readouts."
          - "Active research program in interneuron progenitor transplantation (tuberous sclerosis complex model), CRISPRa iPSC transfection, in utero electroporation (Rheb focal cortical dysplasia type II model), and rabies-virus monosynaptic circuit tracing."
          - "Co-developing the Biocage — a needle-sized porous implantable microdevice fabricated by two-photon polymerization (Nanoscribe) with PEGDA hydrogel precursors — for localized neural stem cell and drug delivery."

      - company: Institute of Nano Science and Technology (INST)
        position: Senior Research Fellow (SRF)
        location: Mohali, India
        start_date: 2016
        end_date: 2020
        summary: >
          Led mechanistic studies on α-synuclein phosphorylation (pS129), ubiquitin-dependent
          degradation, BMI-1 / PRC2 dysregulation, and inflammatory signaling in Parkinson's
          disease models. Developed melatonin- and polydopamine-based nanostructure
          therapeutics linking biomarker changes to therapeutic exposure.
        highlights:
          - Designed quantitative immunoassays and Western / JESS workflows for proteasomal regulation, epigenetic-complex activity, and toxic-aggregate clearance.
          - Established SH-SY5Y and C6 glioma models with multi-color flow cytometry, mitochondrial-potential (JC-1) and protein-kinetics readouts.
          - Quantified amyloid-β aggregation, nanoparticle–protein interactions, and corona-mediated changes in Alzheimer's disease biomarker detection.

      - company: Institute of Nano Science and Technology (INST)
